<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RubiTask - Güvenli Kayıt</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f172a; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; width: 320px; border-radius: 20px; padding: 30px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .logo { color: #2563eb; font-size: 28px; font-weight: bold; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; margin: 10px 0; box-sizing: border-box; text-align: center; font-size: 18px; letter-spacing: 3px; }
        button { background: #2563eb; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .hint { font-size: 11px; color: #ef4444; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">RubiTask</div>
        <p style="color: #475569;">🔒 Hesabını Güvenceye Al</p>
        <input type="password" maxlength="6" id="pin" placeholder="6 Haneli Parola">
        <button onclick="kaydet()">Kaydı Tamamla</button>
        <div class="hint">⚠️ Bu parolayı unutmayın, ödemeler için şarttır!</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        function kaydet() {
            let pin = document.getElementById('pin').value;
            if(pin.length === 6) {
                tg.sendData(pin); // Parolayı bota gönderir
                tg.close(); // Uygulamayı kapatır
            } else {
                alert("Lütfen 6 haneli bir parola gir kanka!");
            }
        }
    </script>
</body>
</html>
