<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RubiTask - Güvenli Giriş</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0f172a; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .kart { background-color: white; width: 320px; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo { color: #2563eb; font-size: 26px; font-weight: bold; margin-bottom: 10px; }
        .alt-metin { color: #475569; font-size: 14px; margin-bottom: 25px; }
        .google-btn { 
            background: white; color: #444; padding: 12px; border: 1px solid #ddd; 
            border-radius: 10px; cursor: pointer; display: flex; align-items: center; 
            justify-content: center; width: 100%; font-weight: 600; transition: 0.2s;
        }
        .google-btn:hover { background: #f8f9fa; }
        .ipucu { font-size: 11px; color: #94a3b8; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="kart">
        <div class="logo">RubiTask</div>
        <p class="alt-metin">Devam etmek için hesabını doğrula</p>
        <button class="google-btn" onclick="onayla()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg" width="18" style="margin-right: 12px;">
            Google Hesabı ile Onayla
        </button>
        <div class="ipucu">🔒 Telegram hesabınızla güvenli bağlantı kurulur.</div>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        function onayla() {
            tg.sendData("giriş_yapıldı"); 
            tg.close();
        }
    </script>
</body>
</html>
